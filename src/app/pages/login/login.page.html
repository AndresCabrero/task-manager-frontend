<ion-content class="login-content">
  <div class="login-wrapper">
    <div class="login-card">

      <div class="logo-container">
        <img src="assets/logotipo-i4life.jpg" alt="Logo i4life">
      </div>

      <div class="login-header">
        <h1>Task Manager</h1>
        <p>Inicia sesión para continuar</p>
      </div>

      <div class="form-group">
        <label>Usuario</label>
        <ion-item class="login-item" lines="none">
          <ion-input
            [(ngModel)]="username"
            placeholder="Introduce tu usuario">
          </ion-input>
        </ion-item>
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <ion-item class="login-item" lines="none">
          <ion-input
            [(ngModel)]="password"
            type="password"
            placeholder="Introduce tu contraseña">
          </ion-input>
        </ion-item>
      </div>

      <ion-button expand="block" class="login-button" (click)="login()">
        Iniciar sesión
      </ion-button>

      <p class="register-text">
        ¿No tienes cuenta?
        <span class="register-link" (click)="goToRegister()">Regístrate</span>
      </p>
    </div>
  </div>
</ion-content>
